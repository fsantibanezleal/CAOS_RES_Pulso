name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Static-first (ADR-0054/0057): the COMMITTED data/derived artifacts are source of truth; the
      # SPA replays them. We do NOT regenerate on deploy (that would need the private pygeotypes +
      # the heavy GeoDFN/open-DARTS engines). The bake is a local/CI step; determinism is enforced by
      # the CI `tests` job (byte-identical for a fixed seed).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build the SPA (copy-data.mjs overlays committed data/derived -> public/)
        run: cd frontend && npm ci && npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
